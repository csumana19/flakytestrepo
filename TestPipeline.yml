# Repro pipeline for tbl_TestFlaky branch-key normalization bug.
# Runs on push to master (rolling) AND on PRs targeting master (PR validation).
# Each path writes a different BuildConfiguration row, which surfaces the
# bare-vs-prefixed branch-key mismatch in tbl_TestFlaky.

trigger:
- master

pr:
- master

pool:
  vmImage: 'windows-latest'

variables:
  solution: '**/*.sln'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'
  Codeql.Enabled: false

stages:
- stage: build
  displayName: Build
  jobs:
  - job: Build
    pool:
      vmImage: 'windows-latest'
    steps:
    - task: NuGetToolInstaller@1

    - script: nuget restore UnitTestProject1.sln
      displayName: 'NuGet restore'

    - task: VSBuild@1
      inputs:
        solution: '$(solution)'
        platform: '$(buildPlatform)'
        configuration: '$(buildConfiguration)'

    # VSTest@2 with rerunFailedTests=true so the deliberately-flaky test
    # fails once, passes on rerun, and ADO records it as a rerun-passed
    # flaky candidate. prc_MarkTestCaseRefsFlaky only inserts rows for
    # tests that pass on rerun. Hosted windows-latest already has VSTest,
    # so no VisualStudioTestPlatformInstaller step is needed.
    - task: VSTest@2
      displayName: 'Run tests (rerun on failure)'
      continueOnError: true
      inputs:
        testSelector: 'testAssemblies'
        testAssemblyVer2: |
          **\bin\$(buildConfiguration)\UnitTestProject1.dll
          !**\*TestAdapter.dll
          !**\obj\**
        platform: '$(buildPlatform)'
        configuration: '$(buildConfiguration)'
        vsTestVersion: 'latest'
        rerunFailedTests: true
        rerunType: 'basedOnTestFailurePercentage'
        rerunFailedThreshold: 100
        rerunMaxAttempts: 2
        rerunFailedTestCasesMaxLimit: 100
        failOnMinTestsNotRun: false
        # continueOnError:true -> when the OLD reader is deployed and the PR build's
        # failures are NOT recognized as flaky, the VSTest task fails but is demoted to
        # a warning, so the build ends PARTIALLYSUCCEEDED (not failed). When the NEW
        # reader is deployed the failures are suppressed, the task succeeds, and the
        # build is SUCCEEDED. That is the pre-fix vs post-fix status flip.
        # rerunFailedTestCasesMaxLimit:100 + rerunFailedThreshold:100 ensure reruns
        # always run even when many tests fail on the first attempt.
        failTaskOnFailedTests: false
        resultsFolder: '$(Agent.TempDirectory)\TestResults'