# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- master

pool:
  name: default

variables:
  solution: '**/*.sln'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'
  Codeql.Enabled: false

stages:
- stage: build
  displayName: Build
  jobs:
  
  - job: Build
    pool:
      name: default
    steps:
    - task: NuGetToolInstaller@1

    - script: nuget restore UnitTestProject1.sln
      displayName: 'NuGet restore (script bypass)'

    - task: VSBuild@1
      inputs:
        solution: '$(solution)'
        platform: '$(buildPlatform)'
        configuration: '$(buildConfiguration)'

    - script: |
        nuget install Microsoft.TestPlatform -Version 17.11.1 -OutputDirectory packages -ExcludeVersion
        set VSTEST=packages\Microsoft.TestPlatform\tools\net462\Common7\IDE\Extensions\TestPlatform\vstest.console.exe
        "%VSTEST%" UnitTestProject1\bin\Release\UnitTestProject1.dll /Logger:trx /ResultsDirectory:TestResults
      displayName: 'Run tests with bundled vstest.console.exe'
      continueOnError: true

    - task: PublishTestResults@2
      inputs:
        testResultsFormat: 'VSTest'
        testResultsFiles: 'TestResults/*.trx'
        failTaskOnFailedTests: false
      condition: always()
